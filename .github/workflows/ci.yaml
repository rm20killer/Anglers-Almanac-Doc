name: Deploy to GitHub pages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0 # Fetch all history
      - name: Copy documents and configurations
        run: |
          cp -v quartz.config.yaml quartz
          cp -rvf content/* quartz/content/
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: quartz/.quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install Node.js dependencies
        working-directory: quartz
        run: |
          npm ci
          npm install @quartz-community/utils

      - name: Install Quartz plugins
        run: npx quartz plugin install
        working-directory: quartz
        
      - name: Build website
        run: npx quartz build
        working-directory: quartz

      - name: Merge Custom HTML
        working-directory: ./quartz
        run: |
          cp -r raw_html/* public/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: quartz/public

  # Deployment job
  deploy:
    needs: build
    if: ${{ github.ref == 'refs/heads/main'}}
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5